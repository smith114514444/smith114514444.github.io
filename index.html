<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>GIF 情绪标注工作台 · 独立记忆版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .workspace {
      max-width: 1100px;
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 1.7rem;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .subtitle {
      color: #475569;
      margin-top: 4px;
      font-size: 0.9rem;
    }
    .main-area {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .file-panel {
      width: 260px;
      border-right: 1px solid #e2e8f0;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .file-panel h3 {
      font-size: 1rem;
      color: #334155;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .load-btn, .clear-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
      flex: 1;
      white-space: nowrap;
    }
    .clear-btn {
      background: #ef4444;
    }
    .load-btn:active { background: #2563eb; }
    .clear-btn:active { background: #dc2626; }
    .file-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      border-radius: 12px;
      background: white;
      border: 1px solid #e2e8f0;
      margin: 0;
      padding: 0;
    }
    .file-list li {
      padding: 10px 14px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.9rem;
      color: #1e293b;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      word-break: break-word;
    }
    .file-list li:hover { background: #eff6ff; }
    .file-list li.active {
      background: #dbeafe;
      font-weight: 600;
      color: #1e40af;
      border-left: 4px solid #3b82f6;
    }
    .file-name {
      flex: 1;
      margin-right: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .delete-file-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 12px;
      line-height: 1;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .delete-file-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }
    .empty-message {
      color: #94a3b8;
      text-align: center;
      padding: 30px 10px;
      font-size: 0.85rem;
    }
    .right-panel {
      flex: 1;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      min-height: 0;
    }
    .preview-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      border-radius: 16px;
      min-height: 180px;
      border: 2px dashed #cbd5e1;
      padding: 10px;
      flex-shrink: 0;
    }
    .preview-area img {
      max-width: 100%;
      max-height: 220px;
      border-radius: 12px;
      object-fit: contain;
    }
    .preview-placeholder {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .annotation-builder {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
    }
    .builder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .builder-header h4 {
      font-size: 1rem;
      color: #0f172a;
    }
    .add-group-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .add-group-btn:active { background: #059669; }
    .groups-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .group-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.85rem;
      color: #475569;
    }
    .group-label {
      font-weight: 600;
      background: #e0e7ff;
      padding: 2px 10px;
      border-radius: 12px;
      color: #3730a3;
      font-size: 0.8rem;
    }
    .remove-group-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .remove-group-btn:active { background: #fee2e2; }
    .tags-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .tag-input-wrap {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 24px;
      padding: 2px 2px 2px 12px;
      transition: border-color 0.2s;
    }
    .tag-input-wrap:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .tag-input-wrap input {
      border: none;
      outline: none;
      font-size: 0.9rem;
      padding: 6px 0;
      width: 90px;
      background: transparent;
    }
    .tag-input-wrap .remove-tag-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 20px;
      line-height: 1;
    }
    .tag-input-wrap .remove-tag-btn:hover { color: #ef4444; }
    .add-tag-btn {
      background: white;
      border: 1px dashed #94a3b8;
      color: #475569;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-tag-btn:active { background: #f1f5f9; }
    .suggest-tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .suggest-tag {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggest-tag:active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .result-area {
      background: #0f172a;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .result-text {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 1rem;
      color: #e2e8f0;
      word-break: break-all;
      flex: 1;
    }
    .copy-btn {
      background: #3b82f6;
      border: none;
      color: white;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .copy-btn:active { background: #2563eb; }
    .tip-box {
      background: #fffbeb;
      border-left: 4px solid #f59e0b;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #78350f;
      line-height: 1.6;
      flex-shrink: 0;
    }
    .tip-box strong { color: #b45309; }

    @media (max-width: 700px) {
      body { padding: 8px; }
      .main-area { flex-direction: column; }
      .file-panel { width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; max-height: 40vh; }
    }
  </style>
</head>
<body>
<div class="workspace">
  <div class="header">
    <h1>🖼️ GIF 情绪标注工作台</h1>
    <div class="subtitle">每个图片独立记忆标注 · 文件可追加 · 复制稳定</div>
  </div>

  <div class="main-area">
    <!-- 左侧文件列表 -->
    <div class="file-panel">
      <h3>📁 图片列表</h3>
      <div class="button-group">
        <button class="load-btn" id="loadFilesBtn">📂 选择</button>
        <button class="clear-btn" id="clearAllBtn">🗑️ 清空</button>
      </div>
      <ul class="file-list" id="fileList">
        <li class="empty-message">点击“选择”或拖放添加</li>
      </ul>
      <div style="font-size:0.7rem; color:#94a3b8; margin-top:8px;">每次选择会追加到列表</div>
    </div>

    <!-- 右侧预览与标注 -->
    <div class="right-panel">
      <div class="preview-area" id="previewContainer">
        <span class="preview-placeholder">👆 点击左侧文件名预览</span>
      </div>

      <div class="annotation-builder">
        <div class="builder-header">
          <h4>🏷️ 标注构建器</h4>
          <button class="add-group-btn" id="addGroupBtn">➕ 添加“或”选项</button>
        </div>
        <div class="groups-container" id="groupsContainer"></div>
        <div class="suggest-tags" id="globalSuggestTags"></div>
      </div>

      <div class="result-area">
        <span class="result-text" id="resultDisplay">—</span>
        <button class="copy-btn" id="copyResultBtn">📋 复制</button>
      </div>

      <div class="tip-box">
        <strong>💡 小贴士：</strong>
        “或” ( / ) 用于拿不准的矛盾情绪； “且” ( + ) 必须同时满足。<br>
        遇到别扭感：<code>强颜+开心 / 略带+伤心</code>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" multiple accept="image/gif" style="display:none">

<script>
  (function() {
    // DOM 元素
    const loadBtn = document.getElementById('loadFilesBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const fileInput = document.getElementById('fileInput');
    const fileListEl = document.getElementById('fileList');
    const previewContainer = document.getElementById('previewContainer');
    const groupsContainer = document.getElementById('groupsContainer');
    const addGroupBtn = document.getElementById('addGroupBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const copyResultBtn = document.getElementById('copyResultBtn');
    const globalSuggestTags = document.getElementById('globalSuggestTags');

    // 状态
    let fileObjects = [];               // { name, blobUrl }
    let activeFileName = null;
    let activeBlobUrl = null;
    // 每个文件的标注记忆
    let annotationsMap = {};

    const commonTags = [
      "开心","喜悦","伤心","愤怒","惊讶","厌恶","恐惧","中性",
      "微","略","非常","极度","强行","故作","明显","略带","自然",
      "抬手","叉腰","瞪眼","皱眉","撇嘴","转头","低头","捂脸",
      "炫耀","掩饰","自嘲","求助","威胁","敷衍","试探","得意"
    ];

    // 渲染全局建议标签
    function renderGlobalSuggest() {
      globalSuggestTags.innerHTML = '';
      commonTags.forEach(tag => {
        const span = document.createElement('span');
        span.className = 'suggest-tag';
        span.textContent = tag;
        span.addEventListener('click', () => {
          if (!activeFileName) return;
          ensureAtLeastOneGroup();
          const cards = groupsContainer.querySelectorAll('.group-card');
          if (cards.length === 0) return;
          const lastCard = cards[cards.length-1];
          addTagToGroup(lastCard, tag);
        });
        globalSuggestTags.appendChild(span);
      });
    }

    function ensureAtLeastOneGroup() {
      if (groupsContainer.children.length === 0) {
        addGroup();
      }
    }

    // 从 DOM 读取当前所有组的标签数组
    function getCurrentGroupsFromDOM() {
      const groups = [];
      const cards = groupsContainer.querySelectorAll('.group-card');
      cards.forEach(card => {
        const inputs = card.querySelectorAll('.tags-area input');
        const tags = Array.from(inputs).map(inp => inp.value.trim()).filter(t => t !== '');
        if (tags.length > 0) groups.push(tags);
      });
      return groups;
    }

    // 保存当前文件的标注
    function saveCurrentAnnotation() {
      if (!activeFileName) return;
      const groupsData = getCurrentGroupsFromDOM();
      if (groupsData.length === 0) {
        delete annotationsMap[activeFileName];
      } else {
        annotationsMap[activeFileName] = groupsData;
      }
    }

    // 加载指定文件的标注到界面
    function loadAnnotationForFile(fileName) {
      groupsContainer.innerHTML = '';
      const groupsData = annotationsMap[fileName];
      if (groupsData && groupsData.length > 0) {
        groupsData.forEach(tags => {
          const card = createGroupElement();
          groupsContainer.appendChild(card);
          tags.forEach(tag => addTagToGroup(card, tag, false));
        });
      } else {
        addGroup();
      }
      updateResult();
    }

    // ---------- UI 组件 ----------
    function createGroupElement() {
      const card = document.createElement('div');
      card.className = 'group-card';
      card.innerHTML = `
        <div class="group-header">
          <span class="group-label">选项</span>
          <span style="font-size:0.8rem; color:#64748b;">（组内用 + 连接）</span>
          <button class="remove-group-btn">✕ 移除</button>
        </div>
        <div class="tags-area"></div>
        <button class="add-tag-btn">+ 添加标签</button>
      `;

      card.querySelector('.remove-group-btn').addEventListener('click', () => {
        card.remove();
        saveCurrentAnnotation();
        updateResult();
      });

      card.querySelector('.add-tag-btn').addEventListener('click', () => {
        addTagToGroup(card, '');
      });
      return card;
    }

    function addGroup() {
      const card = createGroupElement();
      groupsContainer.appendChild(card);
      addTagToGroup(card, '', true);
      saveCurrentAnnotation();
      updateResult();
    }

    function addTagToGroup(card, defaultValue = '', focus = true) {
      const tagsArea = card.querySelector('.tags-area');
      const wrap = document.createElement('div');
      wrap.className = 'tag-input-wrap';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = '输入标签';
      input.value = defaultValue;
      input.setAttribute('list', 'tagSuggestions');
      input.addEventListener('input', () => {
        saveCurrentAnnotation();
        updateResult();
      });
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-tag-btn';
      removeBtn.innerHTML = '×';
      removeBtn.addEventListener('click', () => {
        wrap.remove();
        saveCurrentAnnotation();
        updateResult();
      });
      wrap.appendChild(input);
      wrap.appendChild(removeBtn);
      tagsArea.appendChild(wrap);
      if (focus) input.focus();
      saveCurrentAnnotation();
      updateResult();
    }

    // ---------- 文件管理 ----------
    function addFiles(files) {
      const gifFiles = Array.from(files).filter(f => f.type === 'image/gif' || f.name.toLowerCase().endsWith('.gif'));
      if (gifFiles.length === 0) return;

      gifFiles.forEach(file => {
        // 避免重复添加同名文件（可根据需要处理，这里直接追加）
        const blobUrl = URL.createObjectURL(file);
        fileObjects.push({ name: file.name, blobUrl });
      });

      renderFileList();
      // 如果当前没有激活文件，自动激活第一个
      if (!activeFileName && fileObjects.length > 0) {
        const firstLi = fileListEl.querySelector('li');
        if (firstLi) firstLi.click();
      }
      updateResult();
    }

    function deleteFile(index) {
      if (index < 0 || index >= fileObjects.length) return;
      const obj = fileObjects[index];
      URL.revokeObjectURL(obj.blobUrl);
      const wasActive = (activeFileName === obj.name);
      fileObjects.splice(index, 1);
      // 如果删除的是当前激活文件，清除激活状态
      if (wasActive) {
        activeFileName = null;
        activeBlobUrl = null;
        previewContainer.innerHTML = '<span class="preview-placeholder">👆 点击左侧文件名预览</span>';
        groupsContainer.innerHTML = '';
        updateResult();
      }
      renderFileList();
    }

    function clearAllFiles() {
      fileObjects.forEach(obj => URL.revokeObjectURL(obj.blobUrl));
      fileObjects = [];
      activeFileName = null;
      activeBlobUrl = null;
      previewContainer.innerHTML = '<span class="preview-placeholder">👆 点击左侧文件名预览</span>';
      groupsContainer.innerHTML = '';
      renderFileList();
      updateResult();
    }

    function renderFileList() {
      fileListEl.innerHTML = '';
      if (fileObjects.length === 0) {
        fileListEl.innerHTML = '<li class="empty-message">没有文件，请添加</li>';
        return;
      }
      fileObjects.forEach((obj, index) => {
        const li = document.createElement('li');
        if (activeFileName === obj.name) li.classList.add('active');

        const nameSpan = document.createElement('span');
        nameSpan.className = 'file-name';
        nameSpan.textContent = obj.name;
        li.appendChild(nameSpan);

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-file-btn';
        delBtn.innerHTML = '×';
        delBtn.title = '删除此文件';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteFile(index);
        });
        li.appendChild(delBtn);

        li.addEventListener('click', (e) => {
          // 如果点击的是删除按钮，不触发选择
          if (e.target === delBtn) return;
          selectFile(index, li);
        });
        fileListEl.appendChild(li);
      });
    }

    function selectFile(index, liElement) {
      saveCurrentAnnotation();

      document.querySelectorAll('.file-list li').forEach(el => el.classList.remove('active'));
      liElement.classList.add('active');

      const obj = fileObjects[index];
      activeFileName = obj.name;
      activeBlobUrl = obj.blobUrl;

      previewContainer.innerHTML = `<img src="${obj.blobUrl}" alt="${obj.name}">`;
      loadAnnotationForFile(activeFileName);
    }

    // ---------- 结果生成与复制 ----------
    function getAnnotationString() {
      const groupsData = getCurrentGroupsFromDOM();
      if (groupsData.length === 0) return '';
      return groupsData.map(tags => tags.join('+')).join('/');
    }

    function updateResult() {
      const annotation = getAnnotationString();
      let final = '';
      if (activeFileName && annotation) {
        final = `${activeFileName}:${annotation}`;
      } else if (activeFileName) {
        final = `${activeFileName}:`;
      } else if (annotation) {
        final = annotation;
      } else {
        final = '—';
      }
      resultDisplay.textContent = final;
    }

    function copyResult() {
      const text = resultDisplay.textContent;
      if (!text || text === '—') {
        alert('没有可复制的内容');
        return;
      }
      const doCopy = (t) => {
        navigator.clipboard.writeText(t).then(() => {
          showCopySuccess();
        }).catch(() => {
          fallbackCopy(t);
        });
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        doCopy(text);
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showCopySuccess();
      } catch (err) {
        alert('复制失败，请手动复制');
      }
      document.body.removeChild(textarea);
    }

    function showCopySuccess() {
      copyResultBtn.textContent = '✅ 已复制';
      copyResultBtn.style.background = '#10b981';
      setTimeout(() => {
        copyResultBtn.textContent = '📋 复制';
        copyResultBtn.style.background = '#3b82f6';
      }, 1500);
    }

    // ---------- 事件绑定 ----------
    loadBtn.addEventListener('click', () => fileInput.click());
    clearAllBtn.addEventListener('click', () => {
      if (fileObjects.length > 0 && confirm('确定清空所有文件吗？')) {
        clearAllFiles();
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        addFiles(e.target.files);
        fileInput.value = ''; // 允许重复选择同一文件
      }
    });

    // 拖放追加
    const filePanel = document.querySelector('.file-panel');
    filePanel.addEventListener('dragover', (e) => {
      e.preventDefault();
      filePanel.style.background = '#e0e7ff';
    });
    filePanel.addEventListener('dragleave', () => {
      filePanel.style.background = '#f8fafc';
    });
    filePanel.addEventListener('drop', (e) => {
      e.preventDefault();
      filePanel.style.background = '#f8fafc';
      const items = e.dataTransfer.items;
      if (items) {
        const files = [];
        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          if (item.kind === 'file') {
            const file = item.getAsFile();
            files.push(file);
          }
        }
        if (files.length > 0) addFiles(files);
      }
    });

    addGroupBtn.addEventListener('click', () => {
      if (!activeFileName) {
        alert('请先在左侧选择一个文件');
        return;
      }
      addGroup();
    });

    copyResultBtn.addEventListener('click', copyResult);

    // 初始化
    if (!document.getElementById('tagSuggestions')) {
      const datalist = document.createElement('datalist');
      datalist.id = 'tagSuggestions';
      commonTags.forEach(tag => {
        const option = document.createElement('option');
        option.value = tag;
        datalist.appendChild(option);
      });
      document.body.appendChild(datalist);
    }

    renderGlobalSuggest();
    updateResult();

    // 监听 DOM 变化自动保存
    const observer = new MutationObserver(() => {
      if (activeFileName) {
        saveCurrentAnnotation();
        updateResult();
      }
    });
    observer.observe(groupsContainer, { childList: true, subtree: true, characterData: true });

  })();
</script>
</body>
</html>
