<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>GIF 情绪标注工作台 · 独立记忆版</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .workspace {
      max-width: 1100px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    .header h1 {
      font-size: 1.9rem;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .subtitle {
      color: #475569;
      margin-top: 6px;
      font-size: 0.95rem;
    }
    .main-area {
      display: flex;
      flex: 1;
      min-height: 600px;
      flex-wrap: wrap;
    }
    .file-panel {
      width: 260px;
      border-right: 1px solid #e2e8f0;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    .file-panel h3 {
      font-size: 1rem;
      color: #334155;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .load-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 16px;
      width: 100%;
      transition: background 0.2s;
    }
    .load-btn:active { background: #2563eb; }
    .file-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      border-radius: 12px;
      background: white;
      border: 1px solid #e2e8f0;
    }
    .file-list li {
      padding: 12px 14px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.9rem;
      color: #1e293b;
      cursor: pointer;
      transition: background 0.1s;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .file-list li:hover { background: #eff6ff; }
    .file-list li.active {
      background: #dbeafe;
      font-weight: 600;
      color: #1e40af;
      border-left: 4px solid #3b82f6;
    }
    .empty-message {
      color: #94a3b8;
      text-align: center;
      padding: 30px 10px;
      font-size: 0.85rem;
    }
    .right-panel {
      flex: 1;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .preview-area {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      border-radius: 16px;
      min-height: 200px;
      border: 2px dashed #cbd5e1;
      padding: 10px;
    }
    .preview-area img {
      max-width: 100%;
      max-height: 240px;
      border-radius: 12px;
      object-fit: contain;
    }
    .preview-placeholder {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .annotation-builder {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
    }
    .builder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .builder-header h4 {
      font-size: 1rem;
      color: #0f172a;
    }
    .add-group-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .add-group-btn:active { background: #059669; }
    .groups-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .group-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      position: relative;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.85rem;
      color: #475569;
    }
    .group-label {
      font-weight: 600;
      background: #e0e7ff;
      padding: 2px 10px;
      border-radius: 12px;
      color: #3730a3;
      font-size: 0.8rem;
    }
    .remove-group-btn {
      margin-left: auto;
      background: none;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .remove-group-btn:active { background: #fee2e2; }
    .tags-area {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .tag-input-wrap {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 24px;
      padding: 2px 2px 2px 12px;
      transition: border-color 0.2s;
    }
    .tag-input-wrap:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .tag-input-wrap input {
      border: none;
      outline: none;
      font-size: 0.9rem;
      padding: 6px 0;
      width: 90px;
      background: transparent;
    }
    .tag-input-wrap .remove-tag-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 20px;
      line-height: 1;
    }
    .tag-input-wrap .remove-tag-btn:hover { color: #ef4444; }
    .add-tag-btn {
      background: white;
      border: 1px dashed #94a3b8;
      color: #475569;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-tag-btn:active { background: #f1f5f9; }
    .suggest-tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .suggest-tag {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 0.8rem;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggest-tag:active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .result-area {
      background: #0f172a;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .result-text {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 1rem;
      color: #e2e8f0;
      word-break: break-all;
      flex: 1;
    }
    .copy-btn {
      background: #3b82f6;
      border: none;
      color: white;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .copy-btn:active { background: #2563eb; }
    .tip-box {
      background: #fffbeb;
      border-left: 4px solid #f59e0b;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #78350f;
      line-height: 1.6;
    }
    .tip-box strong { color: #b45309; }
    @media (max-width: 700px) {
      .main-area { flex-direction: column; }
      .file-panel { width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; }
    }
  </style>
</head>
<body>
<div class="workspace">
  <div class="header">
    <h1>🖼️ GIF 情绪标注工作台</h1>
    <div class="subtitle">每个图片独立记忆标注，切换文件自动保存</div>
  </div>

  <div class="main-area">
    <!-- 左侧文件列表 -->
    <div class="file-panel">
      <h3>📁 图片列表</h3>
      <button class="load-btn" id="loadFilesBtn">📂 选择 GIF 文件</button>
      <ul class="file-list" id="fileList">
        <li class="empty-message">尚未加载文件</li>
      </ul>
      <div style="font-size:0.7rem; color:#94a3b8; margin-top:8px;">可多选，或拖放文件夹</div>
    </div>

    <!-- 右侧预览与标注 -->
    <div class="right-panel">
      <div class="preview-area" id="previewContainer">
        <span class="preview-placeholder">👆 点击左侧文件名预览</span>
      </div>

      <div class="annotation-builder">
        <div class="builder-header">
          <h4>🏷️ 标注构建器</h4>
          <button class="add-group-btn" id="addGroupBtn">➕ 添加“或”选项</button>
        </div>
        <div class="groups-container" id="groupsContainer">
          <!-- 动态组 -->
        </div>
        <div class="suggest-tags" id="globalSuggestTags">
          <!-- 常用标签建议 -->
        </div>
      </div>

      <div class="result-area">
        <span class="result-text" id="resultDisplay">—</span>
        <button class="copy-btn" id="copyResultBtn">📋 复制</button>
      </div>

      <div class="tip-box">
        <strong>💡 小贴士：</strong>
        “或” ( / ) 用于描述拿不准、矛盾的情绪或不同可能。<br>
        “且” ( + ) 表示必须同时满足，只绑定它前后的词。<br>
        遇到别扭、强颜欢笑？用 / 分隔不同解读：<code>强颜+开心 / 略带+伤心</code><br>
        不确定就多用 / 给出备选，最后再整理。
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" multiple accept="image/gif" style="display:none">

<script>
  (function() {
    // DOM 元素
    const loadBtn = document.getElementById('loadFilesBtn');
    const fileInput = document.getElementById('fileInput');
    const fileListEl = document.getElementById('fileList');
    const previewContainer = document.getElementById('previewContainer');
    const groupsContainer = document.getElementById('groupsContainer');
    const addGroupBtn = document.getElementById('addGroupBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const copyResultBtn = document.getElementById('copyResultBtn');
    const globalSuggestTags = document.getElementById('globalSuggestTags');

    // 状态
    let fileObjects = [];               // { name, blobUrl }
    let activeFileName = null;
    let activeBlobUrl = null;
    // 每个文件的标注记忆：{ "1.gif": [ ["开心","抬手"], ["喜悦"] ] }
    let annotationsMap = {};

    const commonTags = [
      "开心","喜悦","伤心","愤怒","惊讶","厌恶","恐惧","中性",
      "微","略","非常","极度","强行","故作","明显","略带","自然",
      "抬手","叉腰","瞪眼","皱眉","撇嘴","转头","低头","捂脸",
      "炫耀","掩饰","自嘲","求助","威胁","敷衍","试探","得意"
    ];

    // 渲染全局建议标签
    function renderGlobalSuggest() {
      globalSuggestTags.innerHTML = '';
      commonTags.forEach(tag => {
        const span = document.createElement('span');
        span.className = 'suggest-tag';
        span.textContent = tag;
        span.addEventListener('click', () => {
          if (!activeFileName) return;
          ensureAtLeastOneGroup();
          const groups = getCurrentGroupsFromDOM();
          if (groups.length === 0) return;
          const lastGroup = groups[groups.length-1];
          addTagToGroup(lastGroup, tag);
        });
        globalSuggestTags.appendChild(span);
      });
    }

    function ensureAtLeastOneGroup() {
      if (groupsContainer.children.length === 0) {
        addGroup();
      }
    }

    // ---------- 当前文件标注数据的读写 ----------
    // 从 DOM 读取当前所有组的标签数组
    function getCurrentGroupsFromDOM() {
      const groups = [];
      const cards = groupsContainer.querySelectorAll('.group-card');
      cards.forEach(card => {
        const inputs = card.querySelectorAll('.tags-area input');
        const tags = Array.from(inputs).map(inp => inp.value.trim()).filter(t => t !== '');
        if (tags.length > 0) groups.push(tags);
        else groups.push([]); // 保留空组结构，但保存时过滤掉？
      });
      // 过滤掉完全空的组（没有标签的组不保存）
      return groups.filter(tags => tags.length > 0);
    }

    // 保存当前文件的标注到 annotationsMap
    function saveCurrentAnnotation() {
      if (!activeFileName) return;
      const groupsData = getCurrentGroupsFromDOM();
      if (groupsData.length === 0) {
        delete annotationsMap[activeFileName]; // 无标注则删除记录
      } else {
        annotationsMap[activeFileName] = groupsData;
      }
    }

    // 加载指定文件的标注到界面
    function loadAnnotationForFile(fileName) {
      // 清空当前所有组
      groupsContainer.innerHTML = '';
      const groupsData = annotationsMap[fileName];
      if (groupsData && groupsData.length > 0) {
        groupsData.forEach(tags => {
          const card = createGroupElement();
          groupsContainer.appendChild(card);
          // 添加标签
          tags.forEach(tag => addTagToGroup(card, tag));
          // 如果该组没有任何标签（理论上不会），移除空卡片？保留由用户处理
        });
      } else {
        // 新建一个默认空组
        addGroup();
      }
      updateResult();
    }

    // ---------- 组 UI 构建 ----------
    function createGroupElement() {
      const card = document.createElement('div');
      card.className = 'group-card';
      card.innerHTML = `
        <div class="group-header">
          <span class="group-label">选项</span>
          <span style="font-size:0.8rem; color:#64748b;">（组内用 + 连接）</span>
          <button class="remove-group-btn">✕ 移除</button>
        </div>
        <div class="tags-area"></div>
        <button class="add-tag-btn">+ 添加标签</button>
      `;

      card.querySelector('.remove-group-btn').addEventListener('click', () => {
        card.remove();
        saveCurrentAnnotation();
        updateResult();
      });

      card.querySelector('.add-tag-btn').addEventListener('click', () => {
        addTagToGroup(card, '');
      });
      return card;
    }

    function addGroup() {
      const card = createGroupElement();
      groupsContainer.appendChild(card);
      // 新组添加一个空输入框
      addTagToGroup(card, '');
      saveCurrentAnnotation();
      updateResult();
    }

    function addTagToGroup(card, defaultValue = '') {
      const tagsArea = card.querySelector('.tags-area');
      const wrap = document.createElement('div');
      wrap.className = 'tag-input-wrap';
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = '输入标签';
      input.value = defaultValue;
      input.setAttribute('list', 'tagSuggestions');
      input.addEventListener('input', () => {
        saveCurrentAnnotation();
        updateResult();
      });
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-tag-btn';
      removeBtn.innerHTML = '×';
      removeBtn.addEventListener('click', () => {
        wrap.remove();
        saveCurrentAnnotation();
        updateResult();
      });
      wrap.appendChild(input);
      wrap.appendChild(removeBtn);
      tagsArea.appendChild(wrap);
      if (!defaultValue) input.focus();
      saveCurrentAnnotation();
      updateResult();
    }

    // ---------- 文件列表与预览 ----------
    function loadFiles(files) {
      fileObjects.forEach(obj => URL.revokeObjectURL(obj.blobUrl));
      fileObjects = [];
      activeFileName = null;
      activeBlobUrl = null;
      previewContainer.innerHTML = '<span class="preview-placeholder">👆 点击左侧文件名预览</span>';
      groupsContainer.innerHTML = '';

      const gifFiles = Array.from(files).filter(f => f.type === 'image/gif' || f.name.toLowerCase().endsWith('.gif'));
      if (gifFiles.length === 0) {
        fileListEl.innerHTML = '<li class="empty-message">没有 GIF 文件</li>';
        return;
      }

      gifFiles.forEach(file => {
        const blobUrl = URL.createObjectURL(file);
        fileObjects.push({ name: file.name, blobUrl });
      });

      // 注意：重新加载文件不会清空 annotationsMap，但若文件名重复可能冲突。
      // 简单处理：保留旧标注，新文件若无标注则新建。
      renderFileList();
      updateResult();
    }

    function renderFileList() {
      fileListEl.innerHTML = '';
      if (fileObjects.length === 0) {
        fileListEl.innerHTML = '<li class="empty-message">没有文件</li>';
        return;
      }
      fileObjects.forEach((obj, index) => {
        const li = document.createElement('li');
        li.textContent = obj.name;
        li.dataset.index = index;
        li.addEventListener('click', () => selectFile(index, li));
        fileListEl.appendChild(li);
      });
    }

    function selectFile(index, liElement) {
      // 保存旧文件的标注
      saveCurrentAnnotation();

      // 更新激活状态
      document.querySelectorAll('.file-list li').forEach(el => el.classList.remove('active'));
      liElement.classList.add('active');

      const obj = fileObjects[index];
      activeFileName = obj.name;
      activeBlobUrl = obj.blobUrl;

      // 预览
      previewContainer.innerHTML = `<img src="${obj.blobUrl}" alt="${obj.name}">`;

      // 加载该文件的标注
      loadAnnotationForFile(activeFileName);
    }

    // ---------- 结果生成与复制 ----------
    function getAnnotationString() {
      const groupsData = getCurrentGroupsFromDOM();
      if (groupsData.length === 0) return '';
      return groupsData.map(tags => tags.join('+')).join('/');
    }

    function updateResult() {
      const annotation = getAnnotationString();
      let final = '';
      if (activeFileName && annotation) {
        final = `${activeFileName}:${annotation}`;
      } else if (activeFileName) {
        final = `${activeFileName}:`;
      } else if (annotation) {
        final = annotation;
      } else {
        final = '—';
      }
      resultDisplay.textContent = final;
    }

    function copyResult() {
      const text = resultDisplay.textContent;
      if (!text || text === '—') {
        alert('没有可复制的内容');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        const orig = copyResultBtn.textContent;
        copyResultBtn.textContent = '✅ 已复制';
        copyResultBtn.style.background = '#10b981';
        setTimeout(() => {
          copyResultBtn.textContent = orig;
          copyResultBtn.style.background = '#3b82f6';
        }, 1500);
      }).catch(() => alert('复制失败，请手动复制'));
    }

    // ---------- 事件绑定 ----------
    loadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) loadFiles(e.target.files);
    });

    const filePanel = document.querySelector('.file-panel');
    filePanel.addEventListener('dragover', (e) => {
      e.preventDefault();
      filePanel.style.background = '#e0e7ff';
    });
    filePanel.addEventListener('dragleave', () => {
      filePanel.style.background = '#f8fafc';
    });
    filePanel.addEventListener('drop', (e) => {
      e.preventDefault();
      filePanel.style.background = '#f8fafc';
      const items = e.dataTransfer.items;
      if (items) {
        const files = [];
        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          if (item.kind === 'file') {
            const file = item.getAsFile();
            files.push(file);
          }
        }
        loadFiles(files);
      }
    });

    addGroupBtn.addEventListener('click', () => {
      if (!activeFileName) {
        alert('请先在左侧选择一个文件');
        return;
      }
      addGroup();
    });

    copyResultBtn.addEventListener('click', copyResult);

    // 初始化
    if (!document.getElementById('tagSuggestions')) {
      const datalist = document.createElement('datalist');
      datalist.id = 'tagSuggestions';
      commonTags.forEach(tag => {
        const option = document.createElement('option');
        option.value = tag;
        datalist.appendChild(option);
      });
      document.body.appendChild(datalist);
    }

    renderGlobalSuggest();
    // 初始没有文件，显示空状态
    updateResult();

    // 监听 DOM 变化以自动保存 (MutationObserver)
    const observer = new MutationObserver(() => {
      if (activeFileName) {
        saveCurrentAnnotation();
        updateResult();
      }
    });
    observer.observe(groupsContainer, { childList: true, subtree: true, characterData: true });

  })();
</script>
</body>
</html>
